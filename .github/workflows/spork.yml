name: spork
on:
  push:
    branches: [ "main" ]

jobs:
    reapply_quizzically_creature:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: reapply_quizzically_creature
          run: |
            npm install
            timeout 315m node spork.js
  
