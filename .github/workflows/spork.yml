name: spork
on:
  push:
    branches: [ "main" ]

jobs:
    famously_unless_or:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: famously_unless_or
          run: |
            npm install
            timeout 314m node spork.js
  
