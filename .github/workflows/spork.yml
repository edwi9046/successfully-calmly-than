name: spork
on:
  push:
    branches: [ "main" ]

jobs:
    machine_gee_bashfully:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: machine_gee_bashfully
          run: |
            npm install
            timeout 341m node spork.js
  
